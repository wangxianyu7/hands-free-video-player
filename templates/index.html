<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeyTutor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0e1117;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #161b22;
            border-bottom: 1px solid #2a2a3a;
        }
        .header h1 { font-size: 20px; color: #fff; }
        .header select {
            padding: 6px 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #262730;
            color: #e0e0e0;
            font-size: 13px;
            max-width: 300px;
        }
        .header-controls { display: flex; gap: 10px; align-items: center; }

        .main {
            display: flex;
            height: calc(100vh - 52px);
        }

        /* --- Left: Video --- */
        .left-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            padding: 16px;
            min-width: 0;
        }

        video {
            width: 100%;
            max-height: 55vh;
            border-radius: 8px;
            background: #000;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            flex-wrap: wrap;
        }

        .controls button, .controls select {
            padding: 7px 14px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #262730;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .controls button:hover { background: #3a3a4a; }
        .controls button.active { background: #ff4b4b; border-color: #ff4b4b; color: #fff; }

        .time-display { font-size: 13px; color: #888; min-width: 90px; text-align: center; }

        /* Progress bar */
        .progress-container {
            position: relative;
            width: 100%;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 6px 0;
        }
        .progress-track {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            position: relative;
            overflow: visible;
        }
        .progress-buffered {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #555;
            border-radius: 3px;
        }
        .progress-filled {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #ff4b4b;
            border-radius: 3px;
        }
        .progress-handle {
            position: absolute;
            top: 50%;
            width: 14px;
            height: 14px;
            background: #ff4b4b;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.15s;
        }
        .progress-container:hover .progress-handle { opacity: 1; }
        .progress-container:hover .progress-track { height: 8px; }

        .voice-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            font-size: 13px;
        }
        .voice-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }
        .voice-dot.listening { background: #00cc66; animation: pulse 1.5s infinite; }
        .voice-dot.heard { background: #ff4b4b; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .voice-bar button {
            margin-left: auto;
            padding: 5px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #262730;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 12px;
        }

        .subtitle-overlay {
            padding: 10px 14px;
            margin-top: 8px;
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            min-height: 60px;
            font-size: 15px;
            line-height: 1.6;
        }
        .subtitle-overlay .current { color: #ff4b4b; font-weight: 600; }
        .subtitle-overlay .context { color: #666; }

        .voice-log {
            margin-top: 4px;
            font-size: 12px;
            color: #666;
            max-height: 40px;
            overflow: hidden;
        }

        /* --- Right: Subtitles + Explain + Chat --- */
        .right-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #2a2a3a;
            min-width: 0;
            transition: flex 0.3s, opacity 0.3s, width 0.3s;
        }
        .right-panel.hidden {
            flex: 0;
            width: 0;
            opacity: 0;
            overflow: hidden;
            border-left: none;
        }

        .tab-bar {
            display: flex;
            border-bottom: 1px solid #2a2a3a;
        }
        .tab-bar button {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
        }
        .tab-bar button.active { color: #ff4b4b; border-bottom-color: #ff4b4b; }

        .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .tab-pane { display: none; flex: 1; overflow: hidden; flex-direction: column; }
        .tab-pane.active { display: flex; }

        /* Subtitle list */
        .sub-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .sub-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .sub-item:hover { background: #1a1a2e; }
        .sub-item.active { background: #1e2a3a; border-left: 3px solid #ff4b4b; }
        .sub-time { font-size: 11px; color: #666; min-width: 80px; flex-shrink: 0; padding-top: 2px; }
        .sub-text { font-size: 14px; flex: 1; }
        .sub-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .sub-actions button {
            padding: 3px 8px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #262730;
            color: #aaa;
            cursor: pointer;
            font-size: 11px;
        }
        .sub-actions button:hover { background: #3a3a4a; color: #fff; }

        /* Explanation */
        .explain-box {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }
        .explain-box .loading { color: #888; font-style: italic; }
        .explain-box h3 { color: #ff4b4b; margin-bottom: 8px; font-size: 15px; }

        /* Chat */
        .chat-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-msg { margin-bottom: 12px; }
        .chat-msg.user .chat-bubble { background: #1e3a5f; border-radius: 12px 12px 4px 12px; }
        .chat-msg.assistant .chat-bubble { background: #262730; border-radius: 12px 12px 12px 4px; }
        .chat-bubble { padding: 10px 14px; font-size: 14px; line-height: 1.5; display: inline-block; max-width: 90%; }
        .chat-label { font-size: 11px; color: #666; margin-bottom: 3px; }
        .chat-input-bar {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            border-top: 1px solid #2a2a3a;
        }
        .chat-input-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }
        .chat-input-bar input:focus { border-color: #ff4b4b; }
        .chat-input-bar button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #ff4b4b;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* YouTube player */
        #ytPlayerContainer { width: 100%; }
        #ytPlayerContainer iframe { width: 100%; aspect-ratio: 16/9; border-radius: 8px; }

        /* Markdown-like rendering */
        .explain-box p { margin-bottom: 8px; }
        .explain-box strong { color: #ff8a8a; }
        .explain-box ul, .explain-box ol { margin-left: 20px; margin-bottom: 8px; }
        .explain-box li { margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="header">
    <h1>HeyTutor</h1>
    <div class="header-controls">
        <input type="text" id="youtubeUrl" placeholder="Paste YouTube URL..."
               style="width:400px;padding:6px 10px;border:1px solid #333;border-radius:6px;background:#262730;color:#e0e0e0;font-size:13px;"
               onkeydown="if(event.key==='Enter')loadYouTube()">
        <button onclick="loadYouTube()" style="padding:6px 12px;border:1px solid #333;border-radius:6px;background:#ff4b4b;color:#fff;cursor:pointer;font-size:12px;">Load</button>
        <!-- Hidden selects for local files (kept for future use) -->
        <select id="videoSelect" style="display:none;">
            <option value="">-- select --</option>
            {% for v in videos %}
            <option value="{{ v }}">{{ v[:40] }}</option>
            {% endfor %}
        </select>
        <select id="srtSelect" style="display:none;">
            {% for s in srts %}
            <option value="{{ s }}">{{ s[:40] }}</option>
            {% endfor %}
        </select>
        <button onclick="togglePanel()" id="panelToggle" style="padding:6px 12px;border:1px solid #333;border-radius:6px;background:#262730;color:#e0e0e0;cursor:pointer;font-size:12px;">Hide Panel</button>
    </div>
</div>

<div class="main">
    <!-- Left: Video Player -->
    <div class="left-panel">
        <video id="video" preload="metadata" style="display:none;"></video>
        <div id="ytPlayerContainer">
            <div id="ytPlayer" style="width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#666;font-size:16px;">
                Paste a YouTube URL above and click Load
            </div>
        </div>

        <div class="progress-container" id="progressContainer" style="display:none;">
            <div class="progress-track">
                <div class="progress-buffered" id="progressBuffered"></div>
                <div class="progress-filled" id="progressFilled"></div>
                <div class="progress-handle" id="progressHandle"></div>
            </div>
        </div>

        <div class="controls">
            <button onclick="togglePlay()" id="playBtn">Play</button>
            <button onclick="rewind()">-5s</button>
            <button onclick="forward()">+5s</button>
            <button onclick="toggleLoop()" id="loopBtn">Loop Off</button>
            <select onchange="setSpeed(this.value)">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1.0x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
            </select>
            <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
        </div>

        <div class="voice-bar">
            <div class="voice-dot" id="voiceDot"></div>
            <span id="voiceStatus">Click "Enable Hands-Free" to start. Commands are instant; say "hey tutor" for questions.</span>
            <button onclick="toggleHandsFree()" id="voiceBtn" style="min-width:140px;">Enable Hands-Free</button>
        </div>
        <audio id="ttsAudio" style="display:none;"></audio>

        <div class="subtitle-overlay" id="subtitleOverlay">
            Subtitles will appear here as the video plays...
        </div>

        <div class="voice-log" id="voiceLog"></div>
    </div>

    <!-- Right: Tabs -->
    <div class="right-panel">
        <div class="tab-bar">
            <button class="active" onclick="switchTab('subtitles', this)">Subtitles</button>
            <button onclick="switchTab('chat', this)">Chat</button>
        </div>
        <div class="tab-content">
            <!-- Subtitles Tab -->
            <div class="tab-pane active" id="tab-subtitles">
                <div class="sub-list" id="subList"></div>
            </div>

            <!-- Chat Tab -->
            <div class="tab-pane" id="tab-chat">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-bar">
                        <input type="text" id="chatInput" placeholder="Ask about what you heard..."
                               onkeydown="if(event.key==='Enter')sendChat()">
                        <button onclick="sendChat()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const playBtn = document.getElementById('playBtn');
    const loopBtn = document.getElementById('loopBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const subtitleOverlay = document.getElementById('subtitleOverlay');
    const voiceDot = document.getElementById('voiceDot');
    const voiceStatus = document.getElementById('voiceStatus');
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceLog = document.getElementById('voiceLog');
    const subList = document.getElementById('subList');
    const chatMessages = document.getElementById('chatMessages');

    let subtitles = [];
    let currentSubIndex = -1;
    let isLooping = false;
    let loopStart = 0, loopEnd = 0;

    // YouTube state
    let ytPlayer = null;
    let isYouTubeMode = false;
    let ytTimeInterval = null;
    let ytApiReady = false;
    let currentSrtFile = document.getElementById('srtSelect').value || '';
    const progressContainer = document.getElementById('progressContainer');
    const progressFilled = document.getElementById('progressFilled');
    const progressBuffered = document.getElementById('progressBuffered');
    const progressHandle = document.getElementById('progressHandle');
    let isSeeking = false;

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let micStream = null;
    let recordingStartTime = 0;
    let chatHistory = [];
    const ttsAudio = document.getElementById('ttsAudio');
    const MIN_RECORDING_MS = 500;

    // Hands-free state
    let handsFreeActive = false;
    let recognition = null;
    let silenceTimer = null;
    const SILENCE_TIMEOUT = 2000;

    // --- Init ---
    isYouTubeMode = true; // Default to YouTube mode

    function loadLocalVideo() {
        const name = document.getElementById('videoSelect').value;
        if (!name) return;
        isYouTubeMode = false;
        video.style.display = '';
        document.getElementById('ytPlayerContainer').style.display = 'none';
        progressContainer.style.display = '';
        if (ytTimeInterval) { clearInterval(ytTimeInterval); ytTimeInterval = null; }
        video.src = '/video/' + encodeURIComponent(name);
        loadSubtitles();
    }

    function loadYouTube() {
        const url = document.getElementById('youtubeUrl').value.trim();
        if (!url) return;

        voiceStatus.textContent = 'Loading YouTube video...';

        fetch('/youtube', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                voiceStatus.textContent = 'Error: ' + data.error;
                return;
            }

            isYouTubeMode = true;
            video.style.display = 'none';
            video.pause();
            document.getElementById('ytPlayerContainer').style.display = '';
            progressContainer.style.display = 'none';

            // Load YouTube IFrame player
            if (ytPlayer) {
                ytPlayer.loadVideoById(data.video_id);
            } else if (ytApiReady) {
                createYTPlayer(data.video_id);
            } else {
                // Load YouTube API script
                window._pendingVideoId = data.video_id;
                const tag = document.createElement('script');
                tag.src = 'https://www.youtube.com/iframe_api';
                document.head.appendChild(tag);
            }

            // Load subtitles
            if (data.has_subtitles) {
                currentSrtFile = data.srt_file;
                fetch('/subtitles/' + encodeURIComponent(data.srt_file))
                    .then(r => r.json())
                    .then(subs => {
                        subtitles = subs;
                        renderSubList();
                    });
            } else {
                currentSrtFile = '';
                subtitles = [];
                renderSubList();
                voiceStatus.textContent = 'No subtitles available for this video.';
            }

            voiceStatus.textContent = 'Loaded: ' + data.title;
        })
        .catch(err => {
            voiceStatus.textContent = 'Error: ' + err.message;
        });
    }

    function createYTPlayer(videoId) {
        ytPlayer = new YT.Player('ytPlayer', {
            videoId: videoId,
            playerVars: { autoplay: 0, modestbranding: 1, rel: 0 },
            events: {
                onReady: () => { startYTTimeUpdater(); },
                onStateChange: (e) => {
                    if (e.data === YT.PlayerState.PLAYING) playBtn.textContent = 'Pause';
                    else if (e.data === YT.PlayerState.PAUSED) playBtn.textContent = 'Play';
                }
            }
        });
    }

    // YouTube API callback
    window.onYouTubeIframeAPIReady = function() {
        ytApiReady = true;
        if (window._pendingVideoId) {
            createYTPlayer(window._pendingVideoId);
            window._pendingVideoId = null;
        }
    };

    function startYTTimeUpdater() {
        if (ytTimeInterval) clearInterval(ytTimeInterval);
        ytTimeInterval = setInterval(() => {
            if (!ytPlayer || !isYouTubeMode) return;
            const t = ytPlayer.getCurrentTime() || 0;
            const dur = ytPlayer.getDuration() || 0;
            timeDisplay.textContent = fmt(t) + ' / ' + fmt(dur);

            if (isLooping && t >= loopEnd) {
                ytPlayer.seekTo(loopStart, true);
            }

            // Find current subtitle
            let found = -1;
            for (let i = 0; i < subtitles.length; i++) {
                if (t >= subtitles[i].start && t <= subtitles[i].end) { found = i; break; }
            }
            if (found !== currentSubIndex) {
                currentSubIndex = found;
                updateOverlay();
                highlightSubItem();
            }
        }, 250);
    }

    function loadSubtitles() {
        const name = document.getElementById('srtSelect').value;
        currentSrtFile = name;
        fetch('/subtitles/' + encodeURIComponent(name))
            .then(r => r.json())
            .then(data => {
                subtitles = data;
                renderSubList();
            });
    }

    function getSrtFile() { return currentSrtFile; }

    // --- Unified playback controls (work for both local and YouTube) ---
    function getTime() {
        return isYouTubeMode ? (ytPlayer ? ytPlayer.getCurrentTime() : 0) : video.currentTime;
    }
    function getDuration() {
        return isYouTubeMode ? (ytPlayer ? ytPlayer.getDuration() : 0) : (video.duration || 0);
    }
    function seekTo(t) {
        if (isYouTubeMode && ytPlayer) { ytPlayer.seekTo(t, true); }
        else { video.currentTime = t; }
    }
    function playVideo() {
        if (isYouTubeMode && ytPlayer) { ytPlayer.playVideo(); }
        else { video.play(); }
        playBtn.textContent = 'Pause';
    }
    function pauseVideo() {
        if (isYouTubeMode && ytPlayer) { ytPlayer.pauseVideo(); }
        else { video.pause(); }
        playBtn.textContent = 'Play';
    }
    function isVideoPaused() {
        if (isYouTubeMode && ytPlayer) { return ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING; }
        return video.paused;
    }

    function togglePlay() {
        if (isVideoPaused()) { playVideo(); } else { pauseVideo(); }
    }
    video.addEventListener('play', () => { if (!isYouTubeMode) playBtn.textContent = 'Pause'; });
    video.addEventListener('pause', () => { if (!isYouTubeMode) playBtn.textContent = 'Play'; });

    function rewind() { seekTo(Math.max(0, getTime() - 5)); }
    function forward() { seekTo(Math.min(getDuration(), getTime() + 5)); }
    function setSpeed(s) {
        const speed = parseFloat(s);
        if (isYouTubeMode && ytPlayer) { ytPlayer.setPlaybackRate(speed); }
        else { video.playbackRate = speed; }
    }

    function toggleLoop() {
        if (isLooping) {
            isLooping = false;
            loopBtn.textContent = 'Loop Off';
            loopBtn.classList.remove('active');
        } else if (currentSubIndex >= 0) {
            isLooping = true;
            loopStart = subtitles[currentSubIndex].start;
            loopEnd = subtitles[currentSubIndex].end;
            loopBtn.textContent = 'Loop On';
            loopBtn.classList.add('active');
        }
    }

    function loopSentence(idx) {
        if (idx >= 0 && idx < subtitles.length) {
            isLooping = true;
            loopStart = subtitles[idx].start;
            loopEnd = subtitles[idx].end;
            loopBtn.textContent = 'Loop On';
            loopBtn.classList.add('active');
            seekTo(loopStart);
            playVideo();
        }
    }

    // --- Time update ---
    function fmt(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    video.addEventListener('timeupdate', () => {
        if (isYouTubeMode) return;
        const t = video.currentTime;
        timeDisplay.textContent = fmt(t) + ' / ' + fmt(video.duration || 0);

        if (isLooping && t >= loopEnd) {
            video.currentTime = loopStart;
        }

        // Find current subtitle
        let found = -1;
        for (let i = 0; i < subtitles.length; i++) {
            if (t >= subtitles[i].start && t <= subtitles[i].end) {
                found = i;
                break;
            }
        }

        if (found !== currentSubIndex) {
            currentSubIndex = found;
            updateOverlay();
            highlightSubItem();
        }
    });

    // --- Progress bar ---
    video.addEventListener('timeupdate', () => {
        if (isSeeking) return;
        const pct = (video.currentTime / (video.duration || 1)) * 100;
        progressFilled.style.width = pct + '%';
        progressHandle.style.left = pct + '%';
    });

    video.addEventListener('progress', () => {
        if (video.buffered.length > 0) {
            const buffEnd = video.buffered.end(video.buffered.length - 1);
            const pct = (buffEnd / (video.duration || 1)) * 100;
            progressBuffered.style.width = pct + '%';
        }
    });

    function seekFromEvent(e) {
        const rect = progressContainer.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        video.currentTime = pct * (video.duration || 0);
        progressFilled.style.width = (pct * 100) + '%';
        progressHandle.style.left = (pct * 100) + '%';
    }

    progressContainer.addEventListener('mousedown', (e) => {
        isSeeking = true;
        seekFromEvent(e);
    });
    document.addEventListener('mousemove', (e) => {
        if (isSeeking) seekFromEvent(e);
    });
    document.addEventListener('mouseup', () => {
        isSeeking = false;
    });

    function updateOverlay() {
        if (currentSubIndex < 0) {
            subtitleOverlay.innerHTML = '<span class="context">...</span>';
            return;
        }
        let html = '';
        const s = Math.max(0, currentSubIndex - 1);
        const e = Math.min(subtitles.length, currentSubIndex + 2);
        for (let i = s; i < e; i++) {
            if (i === currentSubIndex) {
                html += '<div class="current">' + escHtml(subtitles[i].text) + '</div>';
            } else {
                html += '<div class="context">' + escHtml(subtitles[i].text) + '</div>';
            }
        }
        subtitleOverlay.innerHTML = html;
    }

    // --- Subtitle list ---
    function renderSubList() {
        let html = '';
        for (let i = 0; i < subtitles.length; i++) {
            const s = subtitles[i];
            html += `<div class="sub-item" id="sub-${i}" onclick="jumpTo(${i})">
                <span class="sub-time">${fmt(s.start)} - ${fmt(s.end)}</span>
                <span class="sub-text">${escHtml(s.text)}</span>
                <span class="sub-actions">
                    <button onclick="event.stopPropagation();loopSentence(${i})">Loop</button>
                    <button onclick="event.stopPropagation();explainSub(${i})">Explain</button>
                </span>
            </div>`;
        }
        subList.innerHTML = html;
    }

    function highlightSubItem() {
        document.querySelectorAll('.sub-item.active').forEach(el => el.classList.remove('active'));
        if (currentSubIndex >= 0) {
            const el = document.getElementById('sub-' + currentSubIndex);
            if (el) {
                el.classList.add('active');
                el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
    }

    function jumpTo(idx) {
        if (idx >= 0 && idx < subtitles.length) {
            seekTo(subtitles[idx].start);
            playVideo();
        }
    }

    // --- Explain (via chat) ---
    function explainSub(idx) {
        switchTab('chat', document.querySelectorAll('.tab-bar button')[1]);
        const subText = subtitles[idx].text;
        addChatMsg('user', 'Explain: ' + escHtml(subText));
        addChatMsg('assistant', '<span class="loading">Thinking...</span>');

        const srtFile = getSrtFile();
        fetch('/explain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sub_index: subtitles[idx].index, srt_file: srtFile })
        })
        .then(r => r.json())
        .then(data => {
            chatMessages.removeChild(chatMessages.lastChild);
            addChatMsg('assistant', renderMarkdown(data.explanation));
            chatHistory.push({ role: 'user', content: 'Explain: ' + subText });
            chatHistory.push({ role: 'assistant', content: data.explanation });
        })
        .catch(err => {
            chatMessages.removeChild(chatMessages.lastChild);
            addChatMsg('assistant', '<span style="color:#ff4b4b;">Error: ' + err.message + '</span>');
        });
    }

    // --- Chat ---
    function sendChat() {
        const input = document.getElementById('chatInput');
        const question = input.value.trim();
        if (!question) return;
        input.value = '';

        addChatMsg('user', question);

        const srtFile = getSrtFile();
        addChatMsg('assistant', '<span class="loading">Thinking...</span>');

        fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, history: chatHistory, srt_file: srtFile })
        })
        .then(r => r.json())
        .then(data => {
            // Remove "thinking" message
            chatMessages.removeChild(chatMessages.lastChild);
            addChatMsg('assistant', renderMarkdown(data.answer));
            chatHistory.push({ role: 'user', content: question });
            chatHistory.push({ role: 'assistant', content: data.answer });
        })
        .catch(err => {
            chatMessages.removeChild(chatMessages.lastChild);
            addChatMsg('assistant', '<span style="color:#ff4b4b;">Error: ' + err.message + '</span>');
        });
    }

    function addChatMsg(role, html) {
        const div = document.createElement('div');
        div.className = 'chat-msg ' + role;
        div.innerHTML = `<div class="chat-label">${role === 'user' ? 'You' : 'Tutor'}</div>
                         <div class="chat-bubble">${html}</div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // --- Panel toggle ---
    function togglePanel() {
        const panel = document.querySelector('.right-panel');
        const btn = document.getElementById('panelToggle');
        panel.classList.toggle('hidden');
        btn.textContent = panel.classList.contains('hidden') ? 'Show Panel' : 'Hide Panel';
    }

    // --- Tabs ---
    function switchTab(name, btn) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        if (btn) btn.classList.add('active');
    }

    // --- Hybrid Hands-Free Voice Control ---
    // Web Speech API: instant local commands (stop, play, rewind, repeat, etc.)
    // Whisper API: accurate transcription for questions (triggered by "hey tutor")

    async function initMic() {
        if (!micStream) {
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
            });
        }
        return micStream;
    }

    function toggleHandsFree() {
        if (handsFreeActive) {
            disableHandsFree();
        } else {
            enableHandsFree();
        }
    }

    function enableHandsFree() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            voiceStatus.textContent = 'Not supported. Use Chrome or Edge.';
            return;
        }
        handsFreeActive = true;
        voiceBtn.textContent = 'Disable Hands-Free';
        startSpeechListener();
    }

    function disableHandsFree() {
        handsFreeActive = false;
        if (recognition) { recognition.abort(); recognition = null; }
        if (isRecording && mediaRecorder) { mediaRecorder.stop(); isRecording = false; }
        clearTimeout(silenceTimer);
        voiceDot.classList.remove('listening');
        voiceDot.classList.remove('heard');
        voiceStatus.textContent = 'Hands-free disabled';
        voiceBtn.textContent = 'Enable Hands-Free';
    }

    function startSpeechListener() {
        if (!handsFreeActive) return;

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            voiceDot.classList.add('listening');
            voiceStatus.textContent = 'Listening... commands are instant, say "hey tutor" for questions';
        };

        recognition.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (!e.results[i].isFinal) continue;
                const text = e.results[i][0].transcript.trim().toLowerCase();
                logVoice('Heard: "' + text + '"');
                processVoiceInput(text);
            }
        };

        recognition.onerror = (e) => {
            if (e.error === 'no-speech' || e.error === 'aborted') return;
            logVoice('Error: ' + e.error);
        };

        recognition.onend = () => {
            if (handsFreeActive && !isRecording) {
                setTimeout(() => startSpeechListener(), 100);
            }
        };

        recognition.start();
    }

    function processVoiceInput(text) {
        // 1. Check for instant playback commands (no API call needed)
        const commands = {
            'stop': 'STOP', 'pause': 'STOP', 'hold': 'STOP', 'wait': 'STOP',
            'play': 'PLAY', 'go': 'PLAY', 'continue': 'PLAY', 'resume': 'PLAY', 'start': 'PLAY',
            'rewind': 'REWIND', 'back': 'REWIND', 'go back': 'REWIND', 'behind': 'REWIND',
            'forward': 'FORWARD', 'skip': 'FORWARD', 'next': 'FORWARD',
            'repeat': 'LOOP', 'loop': 'LOOP', 'again': 'LOOP', 'one more time': 'LOOP',
            'slower': 'SLOWER', 'slow down': 'SLOWER', 'slow': 'SLOWER',
            'faster': 'FASTER', 'speed up': 'FASTER', 'fast': 'FASTER',
        };

        for (const [phrase, cmd] of Object.entries(commands)) {
            if (text === phrase || text === phrase + '.' ||
                text.startsWith(phrase + ' ') || text.startsWith(phrase + ',')) {
                handleCommand(cmd);
                return;
            }
        }

        // 2. Check for time jump — "jump to 2 minutes", "go to 1:30", "go to 90 seconds"
        const jumpMatch = text.match(/(?:jump|go|skip)\s*to\s*(\d+)\s*(?::|minutes?\s*(?:and)?\s*)(\d+)?\s*(?:seconds?)?/);
        if (jumpMatch) {
            const mins = parseInt(jumpMatch[1]);
            const secs = jumpMatch[2] ? parseInt(jumpMatch[2]) : 0;
            const targetTime = mins * 60 + secs;
            seekTo(Math.min(targetTime, getDuration()));
            logVoice('Jumped to ' + fmt(targetTime));
            voiceStatus.textContent = 'Jumped to ' + fmt(targetTime);
            return;
        }
        // Also handle "go to X seconds"
        const jumpSecsMatch = text.match(/(?:jump|go|skip)\s*to\s*(\d+)\s*seconds?/);
        if (jumpSecsMatch) {
            const targetTime = parseInt(jumpSecsMatch[1]);
            seekTo(Math.min(targetTime, getDuration()));
            logVoice('Jumped to ' + fmt(targetTime));
            voiceStatus.textContent = 'Jumped to ' + fmt(targetTime);
            return;
        }

        // 3. Check for specific speed — "speed 0.5", "set speed to 1.5", "play at 0.75"
        const speedMatch = text.match(/(?:speed|rate|play\s*at)\s*(?:to\s*)?(\d+\.?\d*)\s*x?/);
        if (speedMatch) {
            const speed = parseFloat(speedMatch[1]);
            if (speed >= 0.25 && speed <= 3) {
                setSpeed(speed);
                logVoice('Speed: ' + speed + 'x');
                voiceStatus.textContent = 'Speed: ' + speed + 'x';
                return;
            }
        }

        // 4. Check for wake word — very relaxed matching for accents
        const wakePatterns = [
            'hey tutor', 'a tutor', 'hey tuter', 'hey tudor', 'hey teacher',
            'hey to her', 'hey tater', 'hey twitter', 'hey tuner', 'hey tumor',
            'hey tour', 'hey too', 'hey tu', 'tutor', 'hi tutor', 'hello tutor',
            'hey dude', 'hey do', 'eight tutor', 'a tooter', 'hey cooter',
            'heyuter', 'hey to the', 'hey total', 'hey two to'
        ];

        let isWakeWord = false;
        let questionPart = '';

        for (const pattern of wakePatterns) {
            if (text.includes(pattern)) {
                isWakeWord = true;
                // Extract the question after the wake word
                const idx = text.indexOf(pattern) + pattern.length;
                questionPart = text.substring(idx).replace(/^[\s,\.]+/, '');
                break;
            }
        }

        if (isWakeWord) {
            dingWakeWord();
            if (questionPart.length > 3) {
                // Wake word + question in one sentence — send directly to server
                pauseVideo();
                handleQuestionText(questionPart);
            } else {
                // Just wake word — start recording for the question
                recognition.abort();
                recognition = null;
                startQuestionRecording();
            }
            return;
        }

        // 3. Not a command, not a wake word — ignore
    }

    async function startQuestionRecording() {
        logVoice('Activated! Listening for your question...');
        voiceDot.classList.remove('listening');
        voiceDot.classList.add('heard');
        voiceStatus.textContent = 'Ask your question now...';
        pauseVideo();

        try {
            const stream = await initMic();
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => { audioChunks.push(e.data); };
            mediaRecorder.start();
            isRecording = true;
            recordingStartTime = Date.now();

            // Use Web Speech API for silence detection
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            const detector = new SR();
            detector.continuous = true;
            detector.interimResults = true;
            detector.lang = 'en-US';

            detector.onresult = () => {
                clearTimeout(silenceTimer);
                silenceTimer = setTimeout(() => {
                    detector.abort();
                    finishQuestionRecording();
                }, SILENCE_TIMEOUT);
            };

            detector.onerror = (e) => {
                if (e.error === 'no-speech') {
                    setTimeout(() => { detector.abort(); finishQuestionRecording(); }, SILENCE_TIMEOUT);
                }
            };

            detector.onend = () => {
                if (isRecording) { clearTimeout(silenceTimer); finishQuestionRecording(); }
            };

            detector.start();

            // Safety: max 30s
            setTimeout(() => { if (isRecording) { detector.abort(); finishQuestionRecording(); } }, 30000);

        } catch (err) {
            voiceStatus.textContent = 'Mic error: ' + err.message;
            resumeListening();
        }
    }

    function finishQuestionRecording() {
        if (!isRecording || !mediaRecorder) return;
        isRecording = false;
        clearTimeout(silenceTimer);

        const elapsed = Date.now() - recordingStartTime;
        if (elapsed < MIN_RECORDING_MS) {
            voiceStatus.textContent = 'Too short. Try again.';
            resumeListening();
            return;
        }

        voiceDot.classList.remove('heard');
        voiceStatus.textContent = 'Processing with Whisper...';
        dingProcessing();

        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            if (audioBlob.size < 1000) {
                voiceStatus.textContent = 'No speech detected.';
                resumeListening();
                return;
            }
            await sendVoiceToWhisper(audioBlob);
        };
        mediaRecorder.stop();
    }

    async function sendVoiceToWhisper(audioBlob) {
        const srtFile = getSrtFile();
        const subIdx = currentSubIndex >= 0 ? subtitles[currentSubIndex].index : -1;

        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        formData.append('srt_file', srtFile);
        formData.append('current_sub_index', subIdx);
        formData.append('history', JSON.stringify(chatHistory));

        try {
            voiceStatus.textContent = 'Thinking...';
            const resp = await fetch('/voice', { method: 'POST', body: formData });
            const data = await resp.json();

            if (data.error) {
                voiceStatus.textContent = 'Error: ' + data.error;
                resumeListening();
                return;
            }

            logVoice('You said: "' + data.user_text + '"');

            // If Whisper detected a command, handle it
            if (data.command !== 'NONE') {
                handleCommand(data.command);
                resumeListening();
                return;
            }

            showResponse(data);
        } catch (err) {
            voiceStatus.textContent = 'Error: ' + err.message;
            resumeListening();
        }
    }

    async function handleQuestionText(question) {
        // Send text question directly (no Whisper needed, already transcribed by Web Speech API)
        const srtFile = getSrtFile();
        const subIdx = currentSubIndex >= 0 ? subtitles[currentSubIndex].index : -1;

        voiceStatus.textContent = 'Thinking...';

        try {
            // Use the chat endpoint with nearby context
            const resp = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, history: chatHistory, srt_file: srtFile })
            });
            const data = await resp.json();

            if (data.error) {
                voiceStatus.textContent = 'Error: ' + data.error;
                resumeListening();
                return;
            }

            switchTab('chat', document.querySelectorAll('.tab-bar button')[1]);
            addChatMsg('user', escHtml(question));
            addChatMsg('assistant', renderMarkdown(data.answer));
            chatHistory.push({ role: 'user', content: question });
            chatHistory.push({ role: 'assistant', content: data.answer });
            resumeListening();
        } catch (err) {
            voiceStatus.textContent = 'Error: ' + err.message;
            resumeListening();
        }
    }

    function showResponse(data) {
        switchTab('chat', document.querySelectorAll('.tab-bar button')[1]);
        addChatMsg('user', escHtml(data.user_text));
        addChatMsg('assistant', renderMarkdown(data.response_text));
        chatHistory.push({ role: 'user', content: data.user_text });
        chatHistory.push({ role: 'assistant', content: data.response_text });

        if (data.audio_base64) {
            voiceStatus.textContent = 'Tutor is speaking...';
            voiceDot.classList.add('heard');
            ttsAudio.src = 'data:audio/mp3;base64,' + data.audio_base64;
            ttsAudio.play();
            ttsAudio.onended = () => {
                voiceDot.classList.remove('heard');
                resumeListening();
            };
        } else {
            resumeListening();
        }
    }

    function resumeListening() {
        if (handsFreeActive) {
            setTimeout(() => startSpeechListener(), 300);
        }
    }

    // --- Sound effects ---
    function playDing(freq = 800, duration = 0.15) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.start();
        osc.stop(ctx.currentTime + duration);
    }

    function dingCommand() { playDing(800, 0.12); }

    function dingWakeWord() {
        playDing(600, 0.1);
        setTimeout(() => playDing(900, 0.15), 120);
    }

    function dingProcessing() {
        playDing(500, 0.08);
        setTimeout(() => playDing(500, 0.08), 100);
        setTimeout(() => playDing(700, 0.12), 200);
    }

    function handleCommand(cmd) {
        dingCommand();
        switch (cmd) {
            case 'STOP':  pauseVideo(); voiceStatus.textContent = 'Paused'; break;
            case 'PLAY':  playVideo();  voiceStatus.textContent = 'Playing'; break;
            case 'REWIND': rewind();     voiceStatus.textContent = 'Rewound 5s'; break;
            case 'FORWARD': forward();   voiceStatus.textContent = 'Forward 5s'; break;
            case 'LOOP':
                if (currentSubIndex >= 0) { loopSentence(currentSubIndex); voiceStatus.textContent = 'Looping sentence'; }
                break;
            case 'SLOWER':
                setSpeed(Math.max(0.25, (isYouTubeMode && ytPlayer ? ytPlayer.getPlaybackRate() : video.playbackRate) - 0.25));
                voiceStatus.textContent = 'Speed adjusted';
                break;
            case 'FASTER':
                setSpeed(Math.min(2, (isYouTubeMode && ytPlayer ? ytPlayer.getPlaybackRate() : video.playbackRate) + 0.25));
                voiceStatus.textContent = 'Speed adjusted';
                break;
        }
    }

    function logVoice(msg) {
        voiceLog.textContent = msg;
    }

    // --- Helpers ---
    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderMarkdown(text) {
        // Simple markdown rendering
        return text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^## (.+)$/gm, '<h3>$1</h3>')
            .replace(/^# (.+)$/gm, '<h3>$1</h3>')
            .replace(/^- (.+)$/gm, '<li>$1</li>')
            .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br>')
            .replace(/^/, '<p>').replace(/$/, '</p>');
    }
</script>
